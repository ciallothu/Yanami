name: Test & Pre-release

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: pre-release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  validate:
    name: Test and build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses >/dev/null
          sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Test, lint, and build debug APK
        run: |
          chmod +x ./gradlew
          ./gradlew testDebugUnitTest lintDebug assembleDebug

      - name: Upload debug APKs
        uses: actions/upload-artifact@v4
        with:
          name: yanami-debug-apks
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: yanami-lint-report
          path: app/build/reports/lint-results-debug.html
          if-no-files-found: ignore

  pre-release:
    name: Publish pre-release
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download debug APKs
        uses: actions/download-artifact@v4
        with:
          name: yanami-debug-apks
          path: prerelease/raw

      - name: Prepare release assets
        id: assets
        run: |
          VERSION=$(grep 'versionName' app/build.gradle.kts | head -1 | sed 's/.*"\(.*\)".*/\1/')
          SHORT_SHA="${GITHUB_SHA::7}"
          mkdir -p prerelease/assets

          for apk in prerelease/raw/*.apk; do
            name=$(basename "$apk")
            if [[ "$name" == *"universal"* ]]; then
              target="Yanami-v${VERSION}-pre-release-universal.apk"
            elif [[ "$name" == *"arm64-v8a"* ]]; then
              target="Yanami-v${VERSION}-pre-release-arm64-v8a.apk"
            elif [[ "$name" == *"armeabi-v7a"* ]]; then
              target="Yanami-v${VERSION}-pre-release-armeabi-v7a.apk"
            else
              target="Yanami-v${VERSION}-pre-release-debug.apk"
            fi
            cp "$apk" "prerelease/assets/$target"
          done

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"

      - name: Update pre-release tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f pre-release "$GITHUB_SHA"
          git push origin refs/tags/pre-release --force

      - name: Publish GitHub pre-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: pre-release
          name: Yanami Pre-release ${{ steps.assets.outputs.version }}
          body: |
            Automated pre-release build from `${{ github.sha }}`.

            This build passed:
            - `testDebugUnitTest`
            - `lintDebug`
            - `assembleDebug`
          prerelease: true
          make_latest: false
          fail_on_unmatched_files: true
          files: prerelease/assets/Yanami-*.apk
